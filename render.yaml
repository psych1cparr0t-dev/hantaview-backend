services:
  - type: web
    name: hantaview-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: CACHE_TTL_CASES
        value: 3600
      - key: CACHE_TTL_STATS
        value: 1800
      - key: CACHE_TTL_OUTBREAK
        value: 86400
      - key: CORS_ORIGIN
        value: "*"
      - key: ADMIN_API_KEY
        generateValue: true
