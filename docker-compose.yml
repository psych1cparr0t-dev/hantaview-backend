version: '3.9'

services:
  hantaview-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - LOG_FILE=/app/logs/hantaview.log
      - CORS_ORIGIN=http://localhost:8080
      - CACHE_TTL_CASES=3600
      - CACHE_TTL_STATS=1800
      - CACHE_TTL_OUTBREAK=86400
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change_me}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: serve the frontend alongside the API
  hantaview-frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../hantaview-complete.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - hantaview-api
    restart: unless-stopped
